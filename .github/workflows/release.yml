name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0
        with:
          components: clippy, rustfmt
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/api-subway-renderer/viewer/package-lock.json
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Verify tag and repository versions
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          RELEASE_VERSION="$VERSION" PYTHONPATH=scripts python -c 'import os; from release_artifacts import validate_repository_version; validate_repository_version(os.environ["RELEASE_VERSION"])'
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked
      - name: Verify publishable Cargo packages
        run: |
          cargo package --locked -p api-subway-core
          cargo package --locked -p api-subway-analyzers --list >/dev/null
          cargo package --locked -p api-subway-renderer --list >/dev/null
          cargo package --locked -p api-subway --list >/dev/null
      - name: Verify embedded viewer
        working-directory: crates/api-subway-renderer/viewer
        run: |
          npm ci
          npm run typecheck
          npm run build
          git diff --exit-code -- dist/viewer.js
          npx playwright install --with-deps chromium
          npm test
      - name: Verify schemas and release tooling
        run: |
          python -m pip install --disable-pip-version-check jsonschema==4.26.0
          python scripts/validate_schemas.py
          python -m unittest discover -s scripts/tests -v
      - name: Verify committed demo artifacts are current
        run: |
          cargo run --locked -q -p api-subway -- generate fixtures/demo \
            --format svg --format html --format json \
            --out "$GITHUB_WORKSPACE/docs/api-subway" --theme midnight
          git diff --exit-code -- docs/api-subway.svg docs/api-subway.html docs/api-subway.json

  osv-scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --lockfile=./Cargo.lock
        --lockfile=./crates/api-subway-renderer/viewer/package-lock.json
    permissions:
      actions: read
      contents: read
      security-events: write

  build:
    needs: [verify, osv-scan]
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            executable: target/release/api-subway
            npm_platform: linux-x64
            wheel_platform: manylinux_2_35_x86_64
          - runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            executable: target/release/api-subway
            npm_platform: linux-arm64
            wheel_platform: manylinux_2_35_aarch64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            executable: target/release/api-subway
            npm_platform: darwin-x64
            wheel_platform: macosx_11_0_x86_64
          - runner: macos-14
            target: aarch64-apple-darwin
            executable: target/release/api-subway
            npm_platform: darwin-arm64
            wheel_platform: macosx_11_0_arm64
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
            executable: target/release/api-subway.exe
            npm_platform: win32-x64
            wheel_platform: win_amd64
    runs-on: ${{ matrix.runner }}
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Build native binary
        run: cargo build --release --locked -p api-subway
      - name: Verify native binary
        run: ${{ matrix.executable }} --version
      - name: Smoke-test launchers against native binary
        env:
          API_SUBWAY_TEST_BINARY: ${{ github.workspace }}/${{ matrix.executable }}
        shell: bash
        run: |
          npm test --prefix packages/npm
          python -m unittest discover -s packages/python/tests -v
      - name: Build deterministic release packages
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python scripts/package_release.py \
            --binary "${{ matrix.executable }}" \
            --target "${{ matrix.target }}" \
            --npm-platform "${{ matrix.npm_platform }}" \
            --wheel-platform "${{ matrix.wheel_platform }}" \
            --version "$VERSION"
      - name: Install and run generated wheel
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check --no-deps --force-reinstall dist/*.whl
          python -m api_subway --version
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  github-release:
    needs: build
    runs-on: ubuntu-22.04
    environment: release
    permissions:
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Resolve release version
        id: release-version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Finalize release bundle
        shell: bash
        run: |
          VERSION="${{ steps.release-version.outputs.value }}"
          npm pack ./packages/npm --pack-destination dist
          python scripts/generate_sbom.py --version "$VERSION" --output "dist/api-subway-${VERSION}.cdx.json"
          python scripts/write_checksums.py --directory dist
          python scripts/write_checksums.py --directory dist --verify
          python scripts/verify_release.py --directory dist --version "$VERSION"
      - name: Sign build provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-checksums: dist/SHA256SUMS
      - name: Sign SBOM attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.tgz
            dist/*.whl
          sbom-path: dist/api-subway-${{ steps.release-version.outputs.value }}.cdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-bundle
          path: dist/*
          if-no-files-found: error
          retention-days: 14
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes
